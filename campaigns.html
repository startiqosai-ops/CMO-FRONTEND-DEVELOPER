<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaigns | Marketing OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#4F46E5', secondary: '#10B981', accent: '#8B5CF6',
                        success: '#059669', warning: '#D97706', error: '#DC2626',
                        info: '#3B82F6', background: '#F3F4F6', card: '#FFFFFF',
                        'text-primary': '#1F2937', 'text-secondary': '#6B7280', border: '#E5E7EB',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
        .modal-overlay { background-color: rgba(31, 41, 55, 0.75); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex">
    <div id="sidebar-target"></div>

    <main class="flex-1 ml-64 min-h-screen flex flex-col">
        <div id="header-target"></div>

        <div class="p-6 space-y-6">
            <!-- Header -->
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Campaigns</h1>
                    <p class="text-sm text-gray-500 mt-0.5">Manage and monitor all marketing campaigns</p>
                </div>
                <button onclick="openCampaignModal()" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700 transition-colors duration-200 shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Campaign
                </button>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="campaignStats"></div>

            <!-- Filters -->
            <div class="bg-white rounded-lg shadow p-4">
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="relative flex-1">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="campaignSearch" placeholder="Search campaigns..." onkeyup="filterCampaigns()" class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <select id="campaignStatusFilter" onchange="filterCampaigns()" class="px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                        <option value="All Status">All Status</option>
                        <option value="Active">Active</option>
                        <option value="Paused">Paused</option>
                        <option value="Completed">Completed</option>
                    </select>
                    <select id="campaignChannelFilter" onchange="filterCampaigns()" class="px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white">
                        <option value="All Channels">All Channels</option>
                        <option value="Social Media">Social Media</option>
                        <option value="SEO">SEO</option>
                        <option value="Email">Email</option>
                        <option value="Paid Media">Paid Media</option>
                        <option value="PR">PR</option>
                        <option value="Events">Events</option>
                    </select>
                </div>
            </div>

            <!-- Campaigns Table -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200">
                                <th class="py-3 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Campaign</th>
                                <th class="py-3 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Channel</th>
                                <th class="py-3 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Status</th>
                                <th class="py-3 px-4 text-right text-xs font-semibold text-gray-500 uppercase tracking-wide">Budget</th>
                                <th class="py-3 px-4 text-right text-xs font-semibold text-gray-500 uppercase tracking-wide">Spent</th>
                                <th class="py-3 px-4 text-right text-xs font-semibold text-gray-500 uppercase tracking-wide">ROAS</th>
                                <th class="py-3 px-4 text-center text-xs font-semibold text-gray-500 uppercase tracking-wide">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="campaignTableBody"></tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div id="campaignPagination" class="flex items-center justify-between px-4 py-3 border-t border-gray-100"></div>
            </div>
        </div>
    </main>

    <!-- Create Campaign Modal -->
    <div id="campaignModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-overlay absolute inset-0" onclick="closeCampaignModal()"></div>
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
                <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
                    <h2 class="text-lg font-bold text-gray-800">Create New Campaign</h2>
                    <button onclick="closeCampaignModal()" class="p-1.5 rounded-md hover:bg-gray-100 transition-colors">
                        <svg class="w-[18px] h-[18px] text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <form id="campaignForm" onsubmit="submitCampaign(event)" class="p-6 space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Campaign Name <span class="text-red-500">*</span></label>
                        <input type="text" id="campaignName" maxlength="100" placeholder="Enter campaign name" class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <p id="campaignNameError" class="flex items-center gap-1 mt-1.5 text-xs text-red-600 hidden"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span></span></p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Channel <span class="text-red-500">*</span></label>
                        <select id="campaignChannel" class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                            <option value="">Select a channel</option>
                            <option value="Social Media">Social Media</option>
                            <option value="SEO">SEO</option>
                            <option value="Email">Email</option>
                            <option value="Paid Media">Paid Media</option>
                            <option value="PR">PR</option>
                            <option value="Events">Events</option>
                        </select>
                        <p id="campaignChannelError" class="flex items-center gap-1 mt-1.5 text-xs text-red-600 hidden"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span></span></p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Budget ($) <span class="text-red-500">*</span></label>
                        <input type="number" id="campaignBudget" placeholder="Min $100, Max $100,000" class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <p id="campaignBudgetError" class="flex items-center gap-1 mt-1.5 text-xs text-red-600 hidden"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span></span></p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">Start Date <span class="text-red-500">*</span></label>
                            <input type="date" id="campaignStartDate" class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <p id="campaignStartDateError" class="flex items-center gap-1 mt-1.5 text-xs text-red-600 hidden"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span></span></p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">End Date <span class="text-red-500">*</span></label>
                            <input type="date" id="campaignEndDate" class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <p id="campaignEndDateError" class="flex items-center gap-1 mt-1.5 text-xs text-red-600 hidden"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span></span></p>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Target Audience</label>
                        <input type="text" id="campaignAudience" placeholder="e.g., Age 25-45, B2B executives" class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Campaign Goals</label>
                        <input type="text" id="campaignGoals" placeholder="e.g., Brand awareness, Lead generation" class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="flex gap-3 pt-2">
                        <button type="button" onclick="closeCampaignModal()" class="flex-1 px-4 py-2.5 border border-gray-300 text-gray-700 text-sm font-medium rounded-md hover:bg-gray-50 transition-colors">Cancel</button>
                        <button type="submit" class="flex-1 px-4 py-2.5 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700 transition-colors">Create Campaign</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/campaigns.js"></script>
</body>
</html>
