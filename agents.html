<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agents | Marketing OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal-overlay { background: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="bg-[#F3F4F6] text-[#1F2937]">
    <div id="sidebar-container"></div>

    <div class="ml-64 flex flex-col min-h-screen">
        <div id="header-container"></div>

        <main class="p-6 space-y-6">
            <!-- Filter Bar & Search -->
            <div class="bg-white p-4 rounded-lg border border-[#E5E7EB] shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center space-x-2">
                    <button onclick="filterAgents('all')" class="px-4 py-2 text-sm font-semibold rounded-md bg-[#EEF2FF] text-[#4F46E5] border border-[#4F46E5]">All Agents</button>
                    <button onclick="filterAgents('online')" class="px-4 py-2 text-sm font-medium rounded-md text-[#6B7280] hover:bg-gray-50 border border-transparent transition-colors">Online</button>
                    <button onclick="filterAgents('working')" class="px-4 py-2 text-sm font-medium rounded-md text-[#6B7280] hover:bg-gray-50 border border-transparent transition-colors">Working</button>
                    <button onclick="filterAgents('offline')" class="px-4 py-2 text-sm font-medium rounded-md text-[#6B7280] hover:bg-gray-50 border border-transparent transition-colors">Offline</button>
                </div>
                <div class="relative">
                    <input type="text" id="agentSearch" onkeyup="searchAgents()" placeholder="Search agents by name or role..." class="pl-10 pr-4 py-2 bg-[#F3F4F6] border border-[#E5E7EB] rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#4F46E5] w-80 transition-all">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                </div>
            </div>

            <!-- Agent Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="agent-grid">
                <!-- Agents injected by JS -->
            </div>
        </main>
    </div>

    <!-- Agent Detail Modal -->
    <div id="agentModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-[#E5E7EB] flex items-center justify-between">
                <div class="flex items-center">
                    <div id="modalAgentIcon" class="w-12 h-12 rounded-full bg-[#EEF2FF] text-[#4F46E5] flex items-center justify-center text-xl mr-4 shadow-inner">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div>
                        <h2 id="modalAgentName" class="text-xl font-bold">Agent Name</h2>
                        <p id="modalAgentStatus" class="text-sm font-medium text-[#10B981] flex items-center uppercase tracking-wider">
                            <span class="w-2 h-2 rounded-full bg-[#10B981] mr-2"></span> Online
                        </p>
                    </div>
                </div>
                <button onclick="closeAgentModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fa-solid fa-xmark text-2xl"></i>
                </button>
            </div>

            <!-- Tabs -->
            <div class="bg-gray-50 px-6 border-b border-[#E5E7EB] flex items-center space-x-6">
                <button onclick="switchTab('status')" class="py-4 text-sm font-semibold border-b-2 border-[#4F46E5] text-[#4F46E5]" id="tab-status">Status Overview</button>
                <button onclick="switchTab('queue')" class="py-4 text-sm font-medium border-b-2 border-transparent text-[#6B7280] hover:text-[#4F46E5]" id="tab-queue">Task Queue</button>
                <button onclick="switchTab('config')" class="py-4 text-sm font-medium border-b-2 border-transparent text-[#6B7280] hover:text-[#4F46E5]" id="tab-config">Configuration</button>
                <button onclick="switchTab('logs')" class="py-4 text-sm font-medium border-b-2 border-transparent text-[#6B7280] hover:text-[#4F46E5]" id="tab-logs">Audit Logs</button>
            </div>

            <div class="flex-1 overflow-y-auto p-6" id="modalContent">
                <!-- Status Tab Content (Default) -->
                <div id="content-status" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-gray-50 p-4 rounded-lg border border-[#E5E7EB]">
                            <p class="text-xs font-bold text-gray-500 uppercase">Success Rate</p>
                            <h4 class="text-2xl font-bold mt-1">98.2%</h4>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-lg border border-[#E5E7EB]">
                            <p class="text-xs font-bold text-gray-500 uppercase">Tasks Today</p>
                            <h4 class="text-2xl font-bold mt-1">1,240</h4>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-lg border border-[#E5E7EB]">
                            <p class="text-xs font-bold text-gray-500 uppercase">Avg. Response</p>
                            <h4 class="text-2xl font-bold mt-1">0.4s</h4>
                        </div>
                    </div>
                    <div class="bg-white p-4 border border-[#E5E7EB] rounded-lg">
                        <h4 class="font-bold text-sm mb-4">Performance Velocity</h4>
                        <div class="h-64">
                            <canvas id="agentPerformanceChart"></canvas>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3 pt-4">
                        <button onclick="agentAction('start')" class="px-6 py-2.5 bg-[#4F46E5] text-white rounded-md font-bold text-sm shadow-sm hover:bg-[#4338CA] transition-colors"><i class="fa-solid fa-play mr-2"></i> Start</button>
                        <button onclick="agentAction('stop')" class="px-6 py-2.5 bg-white border border-[#E5E7EB] text-[#DC2626] rounded-md font-bold text-sm hover:bg-red-50 transition-colors"><i class="fa-solid fa-stop mr-2"></i> Stop</button>
                        <button onclick="agentAction('pause')" class="px-6 py-2.5 bg-white border border-[#E5E7EB] text-[#D97706] rounded-md font-bold text-sm hover:bg-amber-50 transition-colors"><i class="fa-solid fa-pause mr-2"></i> Pause</button>
                        <button onclick="agentAction('restart')" class="px-6 py-2.5 bg-white border border-[#E5E7EB] text-[#3B82F6] rounded-md font-bold text-sm hover:bg-blue-50 transition-colors"><i class="fa-solid fa-rotate-right mr-2"></i> Restart</button>
                    </div>
                </div>
                <!-- Other tabs hidden initially -->
                <div id="content-queue" class="hidden">Task queue visualization...</div>
                <div id="content-config" class="hidden">Configuration parameters...</div>
                <div id="content-logs" class="hidden">Real-time log stream...</div>
            </div>
        </div>
    </div>

    <script src="js/agents.js"></script>
    <script>
        // Load components
        async function loadComponents() {
            const sidebar = await fetch('components/sidebar.html').then(r => r.text());
            const header = await fetch('components/header.html').then(r => r.text());
            document.getElementById('sidebar-container').innerHTML = sidebar;
            document.getElementById('header-container').innerHTML = header;
            document.getElementById('page-title').textContent = "AI Agent Command Center";
        }
        loadComponents();
    </script>
</body>
</html>
