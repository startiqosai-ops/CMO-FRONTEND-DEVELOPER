<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Marketing OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F3F4F6] text-[#1F2937]">
    <div id="sidebar-container"></div>

    <div class="ml-64 flex flex-col min-h-screen">
        <div id="header-container"></div>

        <main class="p-6 space-y-6">
            <!-- Summary Stats Row -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="bg-white p-6 rounded-lg border border-[#E5E7EB] shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-[#6B7280]">Total Agents</p>
                            <h3 class="text-3xl font-bold mt-1">11</h3>
                        </div>
                        <div class="w-12 h-12 bg-[#EEF2FF] text-[#4F46E5] flex items-center justify-center rounded-lg">
                            <i class="fa-solid fa-users text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg border border-[#E5E7EB] shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-[#6B7280]">Active Agents</p>
                            <h3 class="text-3xl font-bold mt-1 text-[#059669]">11</h3>
                        </div>
                        <div class="w-12 h-12 bg-[#ECFDF5] text-[#10B981] flex items-center justify-center rounded-lg">
                            <i class="fa-solid fa-bolt text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg border border-[#E5E7EB] shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-[#6B7280]">System ROAS</p>
                            <h3 class="text-3xl font-bold mt-1">4.2x</h3>
                        </div>
                        <div class="w-12 h-12 bg-[#F5F3FF] text-[#8B5CF6] flex items-center justify-center rounded-lg">
                            <i class="fa-solid fa-arrow-up-right-dots text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg border border-[#E5E7EB] shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-[#6B7280]">Monthly Savings</p>
                            <h3 class="text-3xl font-bold mt-1">$374K</h3>
                        </div>
                        <div class="w-12 h-12 bg-[#FEF3C7] text-[#D97706] flex items-center justify-center rounded-lg">
                            <i class="fa-solid fa-hand-holding-dollar text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Real-Time Metrics Chart -->
                <div class="lg:col-span-2 bg-white p-6 rounded-lg border border-[#E5E7EB] shadow-sm">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="font-bold text-lg">Real-Time Performance</h2>
                        <div class="flex space-x-2">
                            <button class="px-3 py-1 text-xs font-semibold rounded bg-[#EEF2FF] text-[#4F46E5]">Hourly</button>
                            <button class="px-3 py-1 text-xs font-semibold rounded text-[#6B7280] hover:bg-gray-100">Daily</button>
                        </div>
                    </div>
                    <div class="h-[300px]">
                        <canvas id="performanceChart"></canvas>
                    </div>
                </div>

                <!-- Quick Actions & System Health -->
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-lg border border-[#E5E7EB] shadow-sm">
                        <h2 class="font-bold text-lg mb-4">Quick Actions</h2>
                        <div class="grid grid-cols-1 gap-3">
                            <button onclick="launchOrchestrator()" class="flex items-center justify-center w-full px-4 py-3 bg-[#4F46E5] text-white rounded-md font-semibold text-sm hover:bg-[#4338CA] transition-colors">
                                <i class="fa-solid fa-rocket mr-2"></i> Launch Orchestrator
                            </button>
                            <button onclick="refreshAll()" class="flex items-center justify-center w-full px-4 py-3 bg-white border border-[#E5E7EB] text-[#1F2937] rounded-md font-semibold text-sm hover:bg-gray-50 transition-colors">
                                <i class="fa-solid fa-rotate mr-2"></i> Refresh All Systems
                            </button>
                            <button onclick="exportReport()" class="flex items-center justify-center w-full px-4 py-3 bg-white border border-[#E5E7EB] text-[#1F2937] rounded-md font-semibold text-sm hover:bg-gray-50 transition-colors">
                                <i class="fa-solid fa-file-export mr-2"></i> Export OS Report
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Agent Status Grid -->
            <div class="bg-white p-6 rounded-lg border border-[#E5E7EB] shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="font-bold text-lg">Agent Status Monitor</h2>
                    <a href="agents.html" class="text-sm font-semibold text-[#4F46E5] hover:underline">View All Agents</a>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4" id="agent-status-grid">
                    <!-- Agents will be injected here or hardcoded for static version -->
                </div>
            </div>

            <!-- Recent Activity Table -->
            <div class="bg-white rounded-lg border border-[#E5E7EB] shadow-sm overflow-hidden">
                <div class="p-6 border-b border-[#E5E7EB]">
                    <h2 class="font-bold text-lg">Recent OS Activity</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-[#F9FAFB] text-xs font-semibold text-[#6B7280] uppercase tracking-wider">
                            <tr>
                                <th class="px-6 py-4">Time</th>
                                <th class="px-6 py-4">Agent</th>
                                <th class="px-6 py-4">Action</th>
                                <th class="px-6 py-4">Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-[#E5E7EB] text-sm" id="activity-table-body">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals or other overlays -->

    <script src="js/dashboard.js"></script>
    <script>
        // Load components
        async function loadComponents() {
            const sidebar = await fetch('components/sidebar.html').then(r => r.text());
            const header = await fetch('components/header.html').then(r => r.text());
            document.getElementById('sidebar-container').innerHTML = sidebar;
            document.getElementById('header-container').innerHTML = header;
            // Update active state if needed
        }
        loadComponents();
    </script>
</body>
</html>
