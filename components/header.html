<!-- components/header.html -->
<header class="h-16 bg-white border-b border-[#E5E7EB] flex items-center justify-between px-6 sticky top-0 z-40 w-full">
    <div class="flex items-center flex-1">
        <div class="relative w-96">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-[#6B7280]">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </span>
            <input type="text" placeholder="Search for agents, tasks, or metrics..." class="block w-full pl-10 pr-3 py-2 border border-[#E5E7EB] rounded-md bg-[#F3F4F6] text-sm focus:outline-none focus:ring-1 focus:ring-[#4F46E5] transition-all">
        </div>
    </div>
    <div class="flex items-center space-x-4">
        <button class="relative p-2 text-[#6B7280] hover:text-[#4F46E5] transition-colors">
            <i class="fa-solid fa-bell"></i>
            <span class="absolute top-2 right-2 w-2 h-2 bg-[#DC2626] rounded-full ring-2 ring-white"></span>
        </button>
        <button class="p-2 text-[#6B7280] hover:text-[#4F46E5] transition-colors">
            <i class="fa-solid fa-circle-question"></i>
        </button>
        <div class="w-px h-8 bg-[#E5E7EB] mx-2"></div>
        <div class="flex items-center space-x-3 cursor-pointer group">
            <div class="text-right">
                <p class="text-sm font-bold text-[#1F2937] group-hover:text-[#4F46E5] transition-colors">Admin User</p>
                <p class="text-xs text-[#6B7280]">System Administrator</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-[#4F46E5] flex items-center justify-center text-white font-bold">
                AU
            </div>
        </div>
    </div>
</header>
