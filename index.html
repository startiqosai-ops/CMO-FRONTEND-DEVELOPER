<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing OS | Autonomous Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#4F46E5',
                        background: '#F3F4F6',
                        'text-primary': '#1F2937',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F3F4F6] min-h-screen flex items-center justify-center font-sans">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-[#E5E7EB] text-center">
        <div class="w-20 h-20 bg-[#4F46E5] rounded-2xl flex items-center justify-center text-white text-4xl mx-auto mb-6 shadow-lg shadow-[#4F46E5]/30">
            <i class="fa-solid fa-brain"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-[#1F2937] tracking-tight mb-2">Marketing OS</h1>
        <p class="text-[#6B7280] mb-8 leading-relaxed">Autonomous AI system initialized and ready for deployment. Access your command center below.</p>
        
        <div class="space-y-4">
            <a href="dashboard.html" class="block w-full bg-[#4F46E5] text-white py-4 rounded-xl font-bold hover:bg-[#3b35be] transform active:scale-[0.98] transition-all shadow-md">
                Enter Dashboard
            </a>
            <a href="agents.html" class="block w-full bg-white text-[#4F46E5] border-2 border-[#4F46E5] py-4 rounded-xl font-bold hover:bg-[#F3F4F6] transform active:scale-[0.98] transition-all">
                Manage AI Agents
            </a>
        </div>
        
        <div class="mt-8 pt-8 border-t border-[#E5E7EB] flex justify-between items-center text-[10px] font-bold text-[#6B7280] uppercase tracking-widest">
            <span>Status: Online</span>
            <span>Version 2.4.1</span>
        </div>
    </div>
</body>
</html>
